<!-- Стили для анимации и внешнего вида -->
<style>
#bottomAdBlock {
    max-height: 120px;
    overflow-y: auto;
}
#bottomAdBlock::-webkit-scrollbar {
    width: 5px;
}
#bottomAdBlock::-webkit-scrollbar-track {
    background: #f1f1f1;
}
#bottomAdBlock::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 5px;
}
#bottomAdBlock::-webkit-scrollbar-thumb:hover {
    background: #555;
}

/* Анимация появления */
@keyframes slideUp {
    from {
        transform: translateY(100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}
/* Анимация для изображений - легкое покачивание */
@keyframes floatImage {
    0%, 100% {
        transform: translateY(0) scale(1);
    }
    50% {
        transform: translateY(-3px) scale(1.02);
    }
}
#bottomAdBlock {
    animation: slideUp 1s ease-out;
}
#bottomAdBlock .col img {
    animation: floatImage 4s infinite ease-in-out;
}

/* Эффект "горячей" кнопки */
@keyframes hotButton {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

/* Основные стили для привлечения внимания */
#bottomAdBlock .col {
    position: relative;
}

/* Градиентный фон при наведении */
#bottomAdBlock .col:hover .card {
    background: linear-gradient(45deg, #f8f9fa, #ffffff, #f8f9fa);
    background-size: 200% 200%;
    animation: hotButton 2s ease infinite;
    position: relative;
}

/* Эффект свечения для изображения */
#bottomAdBlock .col:hover img {
    filter: drop-shadow(0 0 8px rgba(162, 145, 102, 0.5));
    transform: scale(1.05);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Текст становится жирным и цветным */
#bottomAdBlock .col:hover .card-title {
    color: #A29166;
    font-weight: bold;
    text-decoration: underline;
    text-decoration-color: #FDFAD9;
    text-underline-offset: 3px;
}

/* Анимация цены/скидки */
#bottomAdBlock .col:hover .card-text {
    position: relative;
    overflow: hidden;
}

#bottomAdBlock .col:hover .card-text::before {
    content: 'СКИДКА 20%!';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff6b6b, #ffa500, #ff6b6b);
    background-size: 200% 200%;
    animation: hotButton 1s infinite;
    color: white;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: hotButton 1s infinite;
}
</style>
