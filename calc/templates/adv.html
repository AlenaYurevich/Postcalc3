<!-- JavaScript для управления блоком -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const bottomBlock = document.getElementById('bottomAdBlock');
    const toggleButton = document.getElementById('toggleBottomBlock');
    const closeButton = document.getElementById('closeBottomBlock');

    // Проверяем, было ли закрыто ранее
    const isClosed = localStorage.getItem('bottomAdClosed') === 'true';

    // Инициализация состояния
    if (!isClosed) {
        bottomBlock.classList.remove('d-none');
        bottomBlock.classList.add('d-block');
        toggleButton.textContent = '▲ Скрыть рекламу';
    } else {
        toggleButton.textContent = '▼ Показать рекламу';
    }

    // Функция для сохранения состояния в localStorage
    function saveState(isHidden) {
        localStorage.setItem('bottomAdClosed', isHidden);
    }

    // Обработчик кнопки переключения
    toggleButton.addEventListener('click', function() {
        if (bottomBlock.classList.contains('d-none')) {
            // Показываем блок
            bottomBlock.classList.remove('d-none');
            bottomBlock.classList.add('d-block');
            this.textContent = '▲ Скрыть рекламу';
            saveState(false);
        } else {
            // Скрываем блок
            bottomBlock.classList.remove('d-block');
            bottomBlock.classList.add('d-none');
            this.textContent = '▼ Показать рекламу';
            saveState(true);
        }
    });

    // Обработчик кнопки закрытия
    closeButton.addEventListener('click', function() {
        bottomBlock.classList.remove('d-block');
        bottomBlock.classList.add('d-none');
        toggleButton.textContent = '▼ Показать рекламу';
        saveState(true);
    });

    // Автоматическое скрытие при скролле вниз (опционально)
    let lastScrollTop = 0;
    window.addEventListener('scroll', function() {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        if (scrollTop > lastScrollTop && scrollTop > 100) {
            // Скролл вниз - скрываем
            if (!bottomBlock.classList.contains('d-none')) {
                bottomBlock.classList.remove('d-block');
                bottomBlock.classList.add('d-none');
                toggleButton.textContent = '▼ Показать рекламу';
            }
        }
        lastScrollTop = scrollTop;
    });
});
</script>

<!-- Стили для анимации и внешнего вида -->
<style>
#bottomAdBlock {
    max-height: 140px;
    overflow-y: auto;
}

#bottomAdBlock::-webkit-scrollbar {
    width: 5px;
}

#bottomAdBlock::-webkit-scrollbar-track {
    background: #f1f1f1;
}

#bottomAdBlock::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 5px;
}

#bottomAdBlock::-webkit-scrollbar-thumb:hover {
    background: #555;
}

/* Анимация появления */
@keyframes slideUp {
    from {
        transform: translateY(100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

#bottomAdBlock.d-block {
    animation: slideUp 0.5s ease-out;
}

/* Адаптивность */
@media (max-width: 768px) {
    #toggleBottomBlock {
        font-size: 0.8rem;
        padding: 0.25rem 0.5rem;
    }
}
</style>
